<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Ciclos</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
            color:#222;
            padding-bottom:100px; /* Un poco más de espacio para la navegación */
        }

        .header{
            background:linear-gradient(135deg,#7b2cbf,#9d4edd);
            color:white;
            padding:25px;
            border-radius:0 0 25px 25px;
        }

        .header h1{
            font-size:24px;
        }

        .header p{
            margin-top:5px;
            opacity:.9;
        }

        .section{
            padding:15px;
        }

        .section-title{
            font-size:18px;
            margin-bottom:10px;
            font-weight:bold;
        }

        .alert-card{
            background:white;
            border-left:5px solid #ff595e;
            padding:12px;
            border-radius:12px;
            margin-bottom:10px;
            box-shadow:0 2px 8px rgba(0,0,0,.08);
        }

        .stats{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:10px;
        }

        .stat{
            background:white;
            border-radius:15px;
            padding:15px;
            text-align:center;
            box-shadow:0 2px 8px rgba(0,0,0,.08);
        }

        .stat-number{
            font-size:26px;
            font-weight:bold;
        }

        .person-card{
            background:white;
            border-radius:15px;
            padding:15px;
            margin-bottom:12px;
            box-shadow:0 2px 8px rgba(0,0,0,.08);
        }

        .person-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .person-name{
            font-size:18px;
            font-weight:bold;
        }

        .status{
            padding:6px 12px;
            border-radius:20px;
            color:white;
            font-size:12px;
            font-weight: bold;
        }

        .ovulacion { background:#e63946; }
        .fertil { background:#2a9d8f; }
        .lutea { background:#6a4c93; }
        .menstruacion { background:#457b9d; }
        .folicular { background:#f4a261; }
        .atraso { background:#555555; }

        .info{
            margin-top:10px;
            color:#555;
        }

        .bottom-nav{
            position:fixed;
            bottom:0;
            left:0;
            width:100%;
            background:white;
            display:flex;
            justify-content:space-around;
            padding:15px 0;
            box-shadow:0 -2px 10px rgba(0,0,0,.1);
            z-index: 10;
        }

        .nav-item{
            text-align:center;
            font-size:14px;
            cursor: pointer;
            flex: 1;
        }

        .fab{
            position:fixed;
            right:20px;
            bottom:90px;
            width:60px;
            height:60px;
            border:none;
            border-radius:50%;
            background:#7b2cbf;
            color:white;
            font-size:28px;
            cursor:pointer;
            box-shadow:0 4px 15px rgba(0,0,0,.25);
            z-index: 10;
        }

        .modal{
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,.5);
            justify-content:center;
            align-items:center;
            z-index:999;
        }

        .modal-content{
            background:white;
            width:90%;
            max-width:400px;
            padding:20px;
            border-radius:20px;
            display:flex;
            flex-direction:column;
            gap:12px;
        }

        .modal-content input{
            padding:10px;
            border:1px solid #ccc;
            border-radius:10px;
        }

        .modal-content button{
            padding:12px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-weight: bold;
        }

        .modal-content button:first-of-type{
            background:#7b2cbf;
            color:white;
        }

        #contenidoHistorial {
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .btn-container {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-periodo{
            flex: 1;
            background:#7b2cbf;
            color:white;
            border:none;
            padding:10px 8px;
            border-radius:10px;
            cursor:pointer;
            font-size:13px;
            font-weight: bold;
            text-align: center;
        }

        .btn-periodo:hover{
            opacity:.9;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Control de Ciclos</h1>
        <p id="fechaActualHeader">Cargando fecha...</p>
    </div>

    <div id="vistaInicio">
        <div class="section">
            <div class="section-title">⚠ Atención Hoy</div>
            <div id="contenedorAlertas"></div>
        </div>

        <div class="section">
            <div class="section-title">Resumen General</div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-number" id="count-ovulacion">0</div>
                    <div>Ovulación</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="count-fertil">0</div>
                    <div>Ventana fértil</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="count-menstruacion">0</div>
                    <div>Menstruación</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="count-folicular">0</div>
                    <div>Folicular</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="count-lutea">0</div>
                    <div>Fase lútea</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="count-atraso">0</div>
                    <div>Retraso</div>
                </div>
            </div>
        </div>
    </div>

    <div id="vistaPersonas" style="display:none;">
        <div class="section">
            <div class="section-title">Personas Registradas</div>
            <div id="listaPersonas"></div>
        </div>
    </div>

    <div id="vistaAjustes" style="display:none;">
        <div class="section">
            <div class="person-card">
                <h3>Configuración</h3>
                <br>
                <button class="btn-periodo" onclick="exportarDatos()">
                    💾 Exportar respaldo
                </button>
                <br><br>
                <button class="btn-periodo" onclick="importarDatos()">
                    📂 Importar respaldo
                </button>
                <br><br>
                <button class="btn-periodo" style="background:#e63946;" onclick="borrarTodo()">
                    🗑 Borrar todos los datos
                </button>
            </div>
        </div>
    </div>

    <button class="fab" onclick="abrirModal()">+</button>

    <div class="bottom-nav">
        <div class="nav-item" onclick="mostrarVista('inicio')">
            🏠<br>Inicio
        </div>
        <div class="nav-item" onclick="mostrarVista('personas')">
            👥<br>Personas
        </div>
        <div class="nav-item" onclick="mostrarVista('ajustes')">
            ⚙️<br>Ajustes
        </div>
    </div>

    <div id="modalPersona" class="modal">
        <div class="modal-content">
            <h2>Nueva Persona</h2>
            <label for="nombrePersona">Nombre</label>
            <input type="text" id="nombrePersona">

            <label for="fechaPeriodo">Primer periodo registrado</label>
            <input type="date" id="fechaPeriodo">

            <button onclick="guardarPersona()">Guardar</button>
            <button onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>

    <div id="modalPeriodo" class="modal">
        <div class="modal-content">
            <h2>Registrar Periodo</h2>
            <input type="date" id="fechaNuevoPeriodo">
            <button onclick="guardarNuevoPeriodo()">Guardar</button>
            <button onclick="cerrarModalPeriodo()">Cancelar</button>
        </div>
    </div>

    <div id="modalHistorial" class="modal">
        <div class="modal-content">
            <h2 id="tituloHistorial">Historial</h2>
            <div id="contenidoHistorial"></div>
            <button onclick="cerrarHistorial()" style="background:#555; color:white;">Cerrar</button>
        </div>
    </div>

    <div id="modalEditarPeriodo" class="modal">
        <div class="modal-content">
            <h2>Editar Periodo</h2>
            <input type="date" id="fechaEditarPeriodo">
            <button onclick="guardarEdicionPeriodo()">Guardar cambios</button>
            <button onclick="cerrarModalEditar()" style="background:#555; color:white;">Cancelar</button>
        </div>
    </div>

    <script>
        let personas = JSON.parse(localStorage.getItem("personas")) || [];
        let personaSeleccionada = null;
        let fechaOriginalEditar = null;

        const opcionesFecha = { day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById("fechaActualHeader").innerText = new Date().toLocaleDateString('es-ES', opcionesFecha);

        function abrirModal(){
            document.getElementById("modalPersona").style.display = "flex";
        }

        function cerrarModal(){
            document.getElementById("modalPersona").style.display = "none";
        }

        function obtenerPrioridadEstado(idClave){
            const prioridades = {
                ovulacion: 1,
                fertil: 2,
                menstruacion: 3,
                folicular: 4,
                lutea: 5,
                atraso: 6
            };
            return prioridades[idClave] || 99;
        }

        function mostrarVista(vista){
            document.getElementById("vistaInicio").style.display = "none";
            document.getElementById("vistaPersonas").style.display = "none";
            document.getElementById("vistaAjustes").style.display = "none";

            if(vista === "inicio"){
                document.getElementById("vistaInicio").style.display = "block";
            }
            if(vista === "personas"){
                document.getElementById("vistaPersonas").style.display = "block";
            }
            if(vista === "ajustes"){
                document.getElementById("vistaAjustes").style.display = "block";
            }
        }

        function guardarPersona(){
            const nombre = document.getElementById("nombrePersona").value;
            const fecha = document.getElementById("fechaPeriodo").value;

            if(!nombre || !fecha){
                alert("Completa todos los campos");
                return;
            }

            const nuevaPersona = {
                id: Date.now(),
                nombre: nombre,
                periodos: [fecha]
            };

            personas.push(nuevaPersona);
            localStorage.setItem("personas", JSON.stringify(personas));

            cerrarModal();
            document.getElementById("nombrePersona").value = "";
            document.getElementById("fechaPeriodo").value = "";
            
            actualizarTodo();
        }

        function registrarPeriodo(id){
            personaSeleccionada = id;
            const hoy = new Date();
            const hoyFormateado = hoy.getFullYear() + '-' + 
                                  String(hoy.getMonth() + 1).padStart(2, '0') + '-' + 
                                  String(hoy.getDate()).padStart(2, '0');
            document.getElementById("fechaNuevoPeriodo").value = hoyFormateado;
            document.getElementById("modalPeriodo").style.display = "flex";
        }

        function cerrarModalPeriodo(){
            document.getElementById("modalPeriodo").style.display = "none";
        }

        function guardarNuevoPeriodo(){
            const fechaNueva = document.getElementById("fechaNuevoPeriodo").value;

            if(!fechaNueva){
                alert("Seleccione una fecha");
                return;
            }

            const persona = personas.find(p => p.id === personaSeleccionada);
            if(!persona) return;

            if(!persona.periodos.includes(fechaNueva)) {
                persona.periodos.push(fechaNueva);
                persona.periodos.sort((a, b) => new Date(a + 'T00:00:00') - new Date(b + 'T00:00:00'));
            }

            localStorage.setItem("personas", JSON.stringify(personas));
            cerrarModalPeriodo();
            document.getElementById("fechaNuevoPeriodo").value = "";

            actualizarTodo();
        }
        
        function obtenerEstado(dia, cicloPromedio = 28){
            const diaOvulacion = Math.max(10, Math.min(cicloPromedio - 14, cicloPromedio - 10));
            const inicioFertil = diaOvulacion - 3;
            const finFertil = diaOvulacion + 2;
            
            if(dia <= 5){
                return { nombre: "Menstruación", clase: "menstruacion", idClave: "menstruacion" };
            }
            if(dia < inicioFertil){
                return { nombre: "Folicular", clase: "folicular", idClave: "folicular" };
            }
            if(dia >= inicioFertil && dia < diaOvulacion){
                return { nombre: "Ventana fértil", clase: "fertil", idClave: "fertil" };
            }
            if(dia === diaOvulacion){
                return { nombre: "Ovulación", clase: "ovulacion", idClave: "ovulacion" };
            }
            if(dia <= finFertil){
                return { nombre: "Ventana fértil", clase: "fertil", idClave: "fertil" };
            }
            if(dia <= cicloPromedio){
                return { nombre: "Fase Lútea", clase: "lutea", idClave: "lutea" };
            }
            return { nombre: "Posible Retraso", clase: "atraso", idClave: "atraso" };
        }

        function cerrarHistorial(){
            document.getElementById("modalHistorial").style.display = "none";
        }
        
        function calcularDiaCiclo(fecha){
            const hoy = new Date();
            const periodo = new Date(fecha + 'T00:00:00');

            hoy.setHours(0,0,0,0);
            periodo.setHours(0,0,0,0);

            const diferencia = Math.floor((hoy - periodo) / (1000 * 60 * 60 * 24));
            return diferencia + 1;
        }

        function calcularCicloPromedio(periodos){
            if(periodos.length < 2){
                return 28; 
            }

            let sumaDias = 0;
            let cantidadCiclos = 0;

            for(let i = 1; i < periodos.length; i++){
                const fechaAnterior = new Date(periodos[i - 1] + 'T00:00:00');
                const fechaActual = new Date(periodos[i] + 'T00:00:00');

                const diferenciaDias = Math.round((fechaActual - fechaAnterior) / (1000 * 60 * 60 * 24));

                if(diferenciaDias >= 15 && diferenciaDias <= 60){
                    sumaDias += diferenciaDias;
                    cantidadCiclos++;
                }
            }

            if(cantidadCiclos === 0){
                return 28;
            }

            return Math.round(sumaDias / cantidadCiclos);
        }

        function verHistorial(id){
            const persona = personas.find(p => p.id === id);
            if(!persona) return;

            document.getElementById("tituloHistorial").innerText = "Historial de " + persona.nombre;

            let html = "";
            const fechas = [...persona.periodos].reverse();

            fechas.forEach(fecha => {
                const fechaObj = new Date(fecha + 'T00:00:00');
                const fechaLegible = fechaObj.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
                
                html += `
                <div style="padding:12px; margin-bottom:8px; background:#f4f6f9; border-radius:10px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div>📅 ${fechaLegible}</div>
                        <small style="color:#888;">${fecha}</small>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="editarPeriodo(${persona.id}, '${fecha}')" style="background:#457b9d; color:white; border:none; padding:6px 12px; border-radius:8px; cursor:pointer;">
                            ✏️
                        </button>
                        <button onclick="eliminarPeriodo(${persona.id}, '${fecha}')" style="background:#e63946; color:white; border:none; padding:6px 12px; border-radius:8px; cursor:pointer;">
                            🗑
                        </button>
                    </div>
                </div>`;
            });

            document.getElementById("contenidoHistorial").innerHTML = html;
            document.getElementById("modalHistorial").style.display = "flex";
        }

        function eliminarPeriodo(idPersona, fecha){
            const persona = personas.find(p => p.id === idPersona);
            if(!persona) return;

            if(persona.periodos.length === 1){
                alert("No puedes eliminar el único periodo registrado.");
                return;
            }

            const ultimoPeriodo = persona.periodos[persona.periodos.length - 1];
            if(fecha === ultimoPeriodo){
                alert("No puedes eliminar el periodo más reciente porque afectaría los cálculos actuales.");
                return;
            }

            const confirmar = confirm("¿Eliminar este registro?");
            if(!confirmar) return;

            persona.periodos = persona.periodos.filter(p => p !== fecha);
            localStorage.setItem("personas", JSON.stringify(personas));

            verHistorial(idPersona);
            actualizarTodo();
        }

        function calcularProximoPeriodo(ultimoPeriodo, cicloPromedio){
            const [anio, mes, dia] = ultimoPeriodo.split('-').map(Number);
            const fecha = new Date(anio, mes - 1, dia);
            fecha.setDate(fecha.getDate() + cicloPromedio);

            return fecha.toLocaleDateString('es-ES', {
                day: 'numeric',
                month: 'short',
                year: 'numeric'
            });
        }

        function eliminarPersona(idPersona){
            const persona = personas.find(p => p.id === idPersona);
            if(!persona) return;

            const texto = prompt(`Escribe ELIMINAR para borrar a ${persona.nombre}`);
            if(texto !== "ELIMINAR"){
                return;
            }
            
            const confirmar = confirm(`¿Eliminar completamente a ${persona.nombre}?\n\nEsta acción no se puede deshacer.`);
            if(!confirmar) return;

            personas = personas.filter(p => p.id !== idPersona);
            localStorage.setItem("personas", JSON.stringify(personas));

            actualizarTodo();
        }

        function editarPeriodo(idPersona, fecha){
            personaSeleccionada = idPersona;
            fechaOriginalEditar = fecha;

            document.getElementById("fechaEditarPeriodo").value = fecha;
            document.getElementById("modalEditarPeriodo").style.display = "flex";
        }

        function cerrarModalEditar(){
            document.getElementById("modalEditarPeriodo").style.display = "none";
        }

        function guardarEdicionPeriodo(){
            const nuevaFecha = document.getElementById("fechaEditarPeriodo").value;

            if(!nuevaFecha){
                alert("Seleccione una fecha");
                return;
            }

            const persona = personas.find(p => p.id === personaSeleccionada);
            if(!persona) return;

            const indice = persona.periodos.indexOf(fechaOriginalEditar);
            if(indice === -1) return;

            persona.periodos[indice] = nuevaFecha;
            persona.periodos.sort((a,b) => new Date(a + 'T00:00:00') - new Date(b + 'T00:00:00'));

            localStorage.setItem("personas", JSON.stringify(personas));

            cerrarModalEditar();
            verHistorial(persona.id);
            actualizarTodo();
        }

        function actualizarTodo(){
            let contenedor = document.getElementById("listaPersonas");
            let contenedorAlertas = document.getElementById("contenedorAlertas");
            if (!contenedor) return;
            
            let html = "";
            let htmlAlertas = "";
            let conteos = { ovulacion: 0, fertil: 0, menstruacion: 0, lutea: 0, folicular: 0, atraso: 0 };

            const personasOrdenadas = [...personas].sort((a, b) => {
                const ultimoA = a.periodos[a.periodos.length - 1];
                const ultimoB = b.periodos[b.periodos.length - 1];

                const diaA = calcularDiaCiclo(ultimoA);
                const diaB = calcularDiaCiclo(ultimoB);

                const cicloA = calcularCicloPromedio(a.periodos);
                const cicloB = calcularCicloPromedio(b.periodos);

                const estadoA = obtenerEstado(diaA, cicloA);
                const estadoB = obtenerEstado(diaB, cicloB);

                return (
                    obtenerPrioridadEstado(estadoA.idClave) -
                    obtenerPrioridadEstado(estadoB.idClave)
                ) || (diaB - diaA);
            });

            personasOrdenadas.forEach(persona => {
                const ultimoPeriodo = persona.periodos[persona.periodos.length - 1];
                const diaCiclo = calcularDiaCiclo(ultimoPeriodo);
                const cicloUser = calcularCicloPromedio(persona.periodos);
                
                const diaOvulacion = cicloUser - 14;

                const fechaOvulacion = new Date(ultimoPeriodo + 'T00:00:00');
                fechaOvulacion.setDate(fechaOvulacion.getDate() + diaOvulacion - 1);

                const porcentajeCiclo = Math.max(0, Math.min(Math.round((diaCiclo / cicloUser) * 100), 100));

                const fechaOvulacionTexto = fechaOvulacion.toLocaleDateString('es-ES', {
                    day: 'numeric',
                    month: 'short',
                    year: 'numeric'
                });
                const proximoPeriodo = calcularProximoPeriodo(ultimoPeriodo, cicloUser);
                const estado = obtenerEstado(diaCiclo, cicloUser);

                if(conteos.hasOwnProperty(estado.idClave)){
                    conteos[estado.idClave]++;
                }

                const inicioFertil = diaOvulacion - 3;

                if(estado.idClave === "ovulacion"){
                    htmlAlertas += `<div class="alert-card">🔴 <strong>${persona.nombre}</strong> tiene ovulación estimada hoy (Día ${diaCiclo})</div>`;
                } else if (diaCiclo === (inicioFertil - 1)) {
                    htmlAlertas += `<div class="alert-card">🟢 <strong>${persona.nombre}</strong> entra en ventana fértil mañana</div>`;
                } else if (diaCiclo === (cicloUser - 2)) { 
                    htmlAlertas += `<div class="alert-card">🟣 <strong>${persona.nombre}</strong> debería iniciar su periodo en 2 días</div>`;
                } else if (estado.idClave === "atraso") {
                    htmlAlertas += `<div class="alert-card" style="border-left-color: #555;">⚠ <strong>${persona.nombre}</strong> presenta un retraso (Día ${diaCiclo})</div>`;
                }

                html += `
                <div class="person-card">
                    <div class="person-header">
                        <div class="person-name">${persona.nombre}</div>
                        <div class="status ${estado.clase}">
                            ${estado.nombre}
                        </div>
                    </div>

                    <div class="info">
                        <strong>Día ciclo:</strong> ${diaCiclo}<br>
                        <strong>Progreso:</strong> Día ${diaCiclo} de ${cicloUser}

                        <div style="width:100%; height:12px; background:#ddd; border-radius:20px; overflow:hidden; margin-top:6px; margin-bottom:10px;">
                            <div style="width:${porcentajeCiclo}%; height:100%; background:#7b2cbf; transition:.3s;"></div>
                        </div>

                        <small style="color:#666;">${porcentajeCiclo}% completado</small>
                        <br><br>
                        <strong>Ciclo promedio:</strong> ${cicloUser} días<br>
                        <strong>Ovulación estimada:</strong> ${fechaOvulacionTexto}<br>
                        <strong>Próximo periodo:</strong> ${proximoPeriodo}<br>
                        <small style="color:#888;">Último periodo: ${ultimoPeriodo}</small>
                        <br><br>
                        <strong>Historial:</strong> ${persona.periodos.length} registros
                        
                        <div class="btn-container">
                            <button class="btn-periodo" onclick="registrarPeriodo(${persona.id})">➕ Periodo</button>
                            <button class="btn-periodo" style="background:#457b9d;" onclick="verHistorial(${persona.id})">👁 Historial</button>
                            <button class="btn-periodo" style="background:#e63946;" onclick="eliminarPersona(${persona.id})">🗑 Eliminar</button>
                        </div>
                    </div>
                </div>`;
            });

            contenedor.innerHTML = html || "<p style='color:#888; text-align:center;'>No hay personas registradas.</p>";
            contenedorAlertas.innerHTML = htmlAlertas || "<div class='alert-card' style='border-left-color: #2a9d8f;'>✅ No hay alertas ni novedades críticas para hoy.</div>";

            document.getElementById("count-ovulacion").innerText = conteos.ovulacion;
            document.getElementById("count-fertil").innerText = conteos.fertil;
            document.getElementById("count-menstruacion").innerText = conteos.menstruacion;
            document.getElementById("count-lutea").innerText = conteos.lutea;
            document.getElementById("count-folicular").innerText = conteos.folicular;
            document.getElementById("count-atraso").innerText = conteos.atraso;
        }

        // FUNCIONES DE AJUSTES (Para evitar errores de ejecución)
        function exportarDatos() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(personas));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "respaldo_ciclos.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function importarDatos() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.readAsText(file,'UTF-8');
                reader.onload = readerEvent => {
                    try {
                        const contenido = JSON.parse(readerEvent.target.result);
                        if (Array.isArray(contenido)) {
                            personas = contenido;
                            localStorage.setItem("personas", JSON.stringify(personas));
                            actualizarTodo();
                            alert("Datos importados con éxito.");
                        } else {
                            alert("Formato de archivo no válido.");
                        }
                    } catch (error) {
                        alert("Error al leer el archivo.");
                    }
                }
            }
            input.click();
        }

        function borrarTodo() {
            if (confirm("¿Estás seguro de que deseas borrar absolutamente todos los datos? Esta acción no se puede deshacer.")) {
                localStorage.removeItem("personas");
                personas = [];
                actualizarTodo();
                mostrarVista('inicio');
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            actualizarTodo();
        });
    </script>
</body>
</html>
